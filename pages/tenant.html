<div id="view-tenant" class="view-section relative overflow-hidden bg-slate-50 min-h-screen">
  <!-- Decorative Background Elements -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none z-0 bg-slate-50">
    <div class="absolute -top-[10%] -left-[10%] w-[50%] h-[50%] rounded-full bg-emerald-200/30 blur-[120px] animate-pulse-slow"></div>
    <div class="absolute top-[20%] -right-[15%] w-[45%] h-[45%] rounded-full bg-teal-200/20 blur-[120px] animate-pulse-slow" style="animation-delay: 2.5s;"></div>
    <div class="absolute -bottom-[20%] left-[20%] w-[60%] h-[60%] rounded-full bg-amber-100/30 blur-[120px] animate-pulse-slow" style="animation-delay: 1.5s;"></div>
    <!-- Mesh pattern overlay -->
    <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-[0.03]"></div>
  </div>

  <div id="tenant-login-form" class="max-w-lg mx-auto px-6 py-16 sm:py-24 relative z-10">
    <!-- Header -->
    <div class="text-center mb-10 sm:mb-14 fade-in">
      <div class="relative w-24 h-24 sm:w-28 sm:h-28 mx-auto mb-6 sm:mb-8 group">
        <!-- Animated rings -->
        <div class="absolute inset-0 rounded-3xl border border-emerald-300/30 scale-[1.15] opacity-50 group-hover:scale-[1.25] transition-transform duration-700"
          style="animation: ping 3s cubic-bezier(0, 0, 0.2, 1) infinite"></div>
        <div class="absolute inset-[-8px] rounded-3xl border border-emerald-300/20 scale-[1.3] opacity-30 group-hover:scale-[1.4] transition-transform duration-700 delay-100"
          style="animation: ping 3s cubic-bezier(0, 0, 0.2, 1) infinite 0.5s"></div>
        <div
          class="relative w-full h-full bg-gradient-to-br from-emerald-500 via-teal-600 to-emerald-800 text-white rounded-3xl flex items-center justify-center shadow-[0_20px_40px_-10px_rgba(16,185,129,0.5)] transform group-hover:-translate-y-2 transition-transform duration-500">
          <i class="fas fa-fingerprint text-4xl sm:text-5xl drop-shadow-md"></i>
        </div>
        <!-- Floating decorative dots -->
        <div class="absolute -top-3 -right-3 w-4 h-4 bg-gradient-to-br from-amber-300 to-amber-500 rounded-full shadow-lg"
          style="animation: float1 4s ease-in-out infinite"></div>
        <div class="absolute -bottom-2 -left-4 w-3 h-3 bg-gradient-to-br from-emerald-300 to-emerald-500 rounded-full shadow-lg"
          style="animation: float1 5s ease-in-out infinite reverse"></div>
      </div>
      <h2 class="text-4xl sm:text-5xl font-black text-slate-900 tracking-tighter leading-tight bg-clip-text text-transparent bg-gradient-to-r from-slate-900 via-slate-700 to-slate-900">
        Tenant Portal
      </h2>
      <p class="text-slate-500 font-medium mt-3 text-sm flex items-center justify-center gap-2">
        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
        Secure access to your room details & payments
      </p>
    </div>

    <!-- Login Card -->
    <div class="bg-white/70 backdrop-blur-2xl p-6 sm:p-10 rounded-[2.5rem] shadow-[0_30px_60px_-15px_rgba(0,0,0,0.05)] border border-white space-y-5 sm:space-y-7 fade-in relative overflow-hidden" style="animation-delay: 0.1s;">
      
      <!-- Top highlight bar -->
      <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-emerald-400 via-teal-500 to-emerald-600 shadow-sm"></div>

      <!-- Quick Info Banner -->
      <div
        class="flex items-center gap-4 bg-emerald-50/50 border border-emerald-100/80 rounded-2xl p-4 transition-all hover:bg-emerald-50 hover:shadow-sm">
        <div
          class="w-12 h-12 bg-white rounded-xl flex items-center justify-center flex-shrink-0 shadow-sm border border-emerald-100 text-emerald-500">
          <i class="fas fa-shield-halved text-lg"></i>
        </div>
        <div>
          <p class="text-emerald-900 text-xs font-black uppercase tracking-wider">End-to-End Encrypted</p>
          <p class="text-emerald-600/80 text-[10px] sm:text-xs font-semibold mt-0.5">Your data is completely private and secure.</p>
        </div>
      </div>

      <!-- Building Select -->
      <div class="group">
        <label class="flex items-center gap-2 mb-2 text-[10px] font-black text-slate-400 uppercase tracking-widest group-focus-within:text-emerald-500 transition-colors">
          <i class="fas fa-building"></i> Select Building
        </label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
            <i class="far fa-building"></i>
          </div>
          <select id="tenant-building-select" class="w-full pl-11 pr-4 py-3.5 bg-slate-50/50 hover:bg-slate-50 border border-slate-200 focus:border-emerald-400 focus:ring-4 focus:ring-emerald-400/10 rounded-2xl text-slate-800 font-semibold transition-all outline-none appearance-none"></select>
          <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400">
            <i class="fas fa-chevron-down text-xs"></i>
          </div>
        </div>
      </div>

      <!-- Room Number -->
      <div class="group">
        <label class="flex items-center gap-2 mb-2 text-[10px] font-black text-slate-400 uppercase tracking-widest group-focus-within:text-emerald-500 transition-colors">
          <i class="fas fa-door-open"></i> Room Number
        </label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
            <i class="fas fa-hashtag"></i>
          </div>
          <input type="number" id="tenant-room-input" inputmode="numeric" placeholder="e.g. 101"
            class="w-full pl-11 pr-4 py-3.5 bg-slate-50/50 hover:bg-slate-50 border border-slate-200 focus:border-emerald-400 focus:ring-4 focus:ring-emerald-400/10 rounded-2xl text-slate-800 font-semibold transition-all outline-none placeholder:text-slate-400 placeholder:font-medium" />
        </div>
      </div>

      <!-- Password -->
      <div class="group relative">
        <label class="flex items-center gap-2 mb-2 text-[10px] font-black text-slate-400 uppercase tracking-widest group-focus-within:text-emerald-500 transition-colors">
          <i class="fas fa-lock"></i> Password
        </label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
            <i class="fas fa-key"></i>
          </div>
          <input type="password" id="tenant-pass-input" placeholder="Enter your room password"
            class="w-full pl-11 pr-14 py-3.5 bg-slate-50/50 hover:bg-slate-50 border border-slate-200 focus:border-emerald-400 focus:ring-4 focus:ring-emerald-400/10 rounded-2xl text-slate-800 font-semibold transition-all outline-none placeholder:text-slate-400 placeholder:font-medium" />
          <button type="button" onclick="toggleTenantPass()"
            class="absolute right-3 top-1/2 -translate-y-1/2 w-8 h-8 rounded-xl bg-white shadow-sm border border-slate-100 flex items-center justify-center text-slate-400 hover:text-emerald-600 hover:border-emerald-200 transition-all">
            <i id="tenant-pass-eye" class="fas fa-eye text-xs"></i>
          </button>
        </div>
      </div>

      <!-- Error -->
      <div id="tenant-error"
        class="hidden text-rose-600 text-sm font-semibold bg-rose-50 border border-rose-100 rounded-xl p-4 flex items-center gap-3 animate-[fadeInUp_0.3s_ease]">
      </div>

      <!-- Submit -->
      <button id="tenant-login-btn" onclick="fetchTenantDashboard()"
        class="w-full bg-gradient-to-r from-emerald-600 to-teal-700 hover:from-emerald-700 hover:to-teal-800 text-white py-4 sm:py-4.5 rounded-2xl font-black text-base shadow-[0_10px_20px_-10px_rgba(16,185,129,0.5)] hover:shadow-[0_15px_25px_-10px_rgba(16,185,129,0.6)] active:scale-[0.98] transition-all flex items-center justify-center gap-3 overflow-hidden group tracking-wide">
        <i class="fas fa-arrow-right-to-bracket transition-transform group-hover:translate-x-1 drop-shadow-sm"></i>
        <span class="drop-shadow-sm">Access My Room</span>
      </button>

      <!-- Divider -->
      <div class="flex items-center gap-4 py-2">
        <div class="flex-1 h-px bg-slate-200"></div>
        <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest">Help & Support</span>
        <div class="flex-1 h-px bg-slate-200"></div>
      </div>

      <!-- Help Links -->
      <div class="flex flex-col sm:flex-row gap-3">
        <a href="https://wa.me/919142272776?text=Hello%20ANVI%20STAY%2C%0A%0AI%20have%20forgotten%20my%20resident%20portal%20password.%0A%0A%F0%9F%8F%A0%20PG%20Name%3A%20%5BPlease%20enter%20your%20PG%20name%5D%0A%F0%9F%9A%AA%20Room%20No%3A%20%5BPlease%20enter%20your%20room%20number%5D%0A%F0%9F%91%A4%20Name%3A%20%5BYour%20full%20name%5D%0A%F0%9F%93%B1%20Registered%20Phone%3A%20%5BYour%20phone%20number%5D%0A%0APlease%20help%20me%20reset%20my%20password.%20Thank%20you!"
          target="_blank" rel="noopener noreferrer"
          class="flex-1 text-center bg-white hover:bg-slate-50 text-slate-600 py-3 rounded-xl font-bold text-xs transition-all flex items-center justify-center gap-2 border border-slate-200 hover:border-slate-300 shadow-sm hover:shadow">
          <i class="fab fa-whatsapp text-emerald-500 text-sm"></i> Forgot Details?
        </a>
        <a href="https://wa.me/919142272776?text=Hello%20ANVI%20STAY%20Support%2C%0A%0AI%20need%20help%20with%20the%20resident%20portal.%0A%0A%F0%9F%8F%A0%20PG%20Name%3A%20%5BPlease%20enter%20your%20PG%20name%5D%0A%F0%9F%9A%AA%20Room%20No%3A%20%5BPlease%20enter%20your%20room%20number%5D%0A%F0%9F%91%A4%20Name%3A%20%5BYour%20full%20name%5D%0A%0AIssue%3A%20%5BPlease%20describe%20your%20issue%5D%0A%0AThank%20you!"
          target="_blank" rel="noopener noreferrer"
          class="flex-1 text-center bg-white hover:bg-slate-50 text-slate-600 py-3 rounded-xl font-bold text-xs transition-all flex items-center justify-center gap-2 border border-slate-200 hover:border-slate-300 shadow-sm hover:shadow">
          <i class="fas fa-headset text-[#C8A24A] text-sm"></i> Portal Issue
        </a>
      </div>

      <!-- Back -->
      <button onclick="goBack()" class="w-full py-3 text-xs font-bold text-slate-400 hover:text-slate-600 flex items-center justify-center gap-2 transition-colors">
        <i class="fas fa-arrow-left"></i> Return to Homepage
      </button>
    </div>

    <!-- Trust Badges -->
    <div class="flex justify-center flex-wrap gap-4 sm:gap-8 mt-12 fade-in" style="animation-delay: 0.2s;">
      <div class="flex items-center gap-2 text-[9px] font-black text-slate-400 uppercase tracking-widest backdrop-blur-sm bg-white/40 px-3 py-1.5 rounded-full border border-white/50">
        <i class="fas fa-lock text-[#C8A24A]"></i> Bank-Level Security
      </div>
      <div class="flex items-center gap-2 text-[9px] font-black text-slate-400 uppercase tracking-widest backdrop-blur-sm bg-white/40 px-3 py-1.5 rounded-full border border-white/50">
        <i class="fas fa-shield-halved text-emerald-500"></i> Privacy First
      </div>
    </div>
  </div>

  <!-- Theme Toggle -->
  <button onclick="document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');" 
    class="fixed top-4 right-4 z-50 w-10 h-10 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border border-slate-200 dark:border-slate-700 rounded-full flex items-center justify-center text-slate-500 hover:text-emerald-500 shadow-sm transition">
    <i class="fas fa-moon dark:hidden"></i>
    <i class="fas fa-sun hidden dark:block text-amber-400"></i>
  </button>

  <div id="tenant-dash" class="max-w-[72rem] mx-auto px-4 sm:px-6 py-8 sm:py-12 hidden relative z-10 w-full mb-16 sm:mb-0"></div>

    <a href="#" onclick="switchTenantTab('maintenance'); return false;" class="nav-item" data-tab="maintenance"><i class="fas fa-wrench"></i><span>Maintenance</span></a>

  </div>
</div>
